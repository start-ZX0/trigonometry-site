<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محاكي الدوال المثلثية</title>
<link rel="stylesheet" href="style.css">

<style>
.sim-box{
    background:white;
    padding:25px;
    border-radius:15px;
    max-width:900px;
    margin:20px auto;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

canvas{
    background:#f9f9f9;
    border-radius:10px;
    margin-top:20px;
}

.values{
    margin-top:15px;
    font-weight:bold;
}
</style>

</head>
<body>

<header>
    <div class="logo">MRπ</div>
    <nav><a href="learn.html">رجوع</a></nav>
</header>

<div class="sim-box">

<h2>محاكي الدوال المثلثية 🔥</h2>
<p>حرّك الزاوية وشاهد sin و cos و tan مباشرة</p>

<canvas id="c" width="320" height="320"></canvas>

<div class="values">
    <span id="sinV">sin: 0</span> |
    <span id="cosV">cos: 1</span> |
    <span id="tanV">tan: 0</span>
</div>

<input type="range" id="slider" min="0" max="360" value="0" style="width:80%;">

<div style="margin-top:15px;">
    <button class="btn" onclick="setA(30)">30°</button>
    <button class="btn" onclick="setA(45)">45°</button>
    <button class="btn" onclick="setA(60)">60°</button>
    <button class="btn" onclick="setA(90)">90°</button>
</div>

</div>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

const cx = 160;
const cy = 160;
const r = 110;

const slider = document.getElementById("slider");

function draw(deg){
    ctx.clearRect(0,0,320,320);

    // دائرة
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.stroke();

    let rad = deg * Math.PI/180;

    let x = cx + r*Math.cos(rad);
    let y = cy - r*Math.sin(rad);

    // الوتر
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(x,y);
    ctx.strokeStyle="red";
    ctx.stroke();

    // cos
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(x,cy);
    ctx.strokeStyle="blue";
    ctx.stroke();

    // sin
    ctx.beginPath();
    ctx.moveTo(x,cy);
    ctx.lineTo(x,y);
    ctx.strokeStyle="green";
    ctx.stroke();

    // tan (امتداد)
    let tx = cx + r;
    let ty = cy - r*Math.tan(rad);

    if(Math.abs(Math.tan(rad)) < 5){
        ctx.beginPath();
        ctx.moveTo(cx+r,cy);
        ctx.lineTo(tx,ty);
        ctx.strokeStyle="purple";
        ctx.stroke();
    }

    // نقطة
    ctx.beginPath();
    ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fill();

    // قيم
    document.getElementById("sinV").innerText = "sin: " + Math.sin(rad).toFixed(2);
    document.getElementById("cosV").innerText = "cos: " + Math.cos(rad).toFixed(2);

    let tanVal = Math.tan(rad);
    document.getElementById("tanV").innerText =
        Math.abs(tanVal) > 10 ? "tan: ∞" : "tan: " + tanVal.toFixed(2);
}

slider.oninput = ()=> draw(slider.value);

function setA(v){
    slider.value = v;
    draw(v);
}

draw(0);
</script>

</body>
</html>
