<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شرح تفاعلي متقدم</title>
<link rel="stylesheet" href="style.css">

<style>
.canvas-box{
    background:white;
    padding:25px;
    border-radius:15px;
    max-width:900px;
    margin:20px auto;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

canvas{
    background:#f9f9f9;
    border-radius:10px;
    margin-top:20px;
}

.controls{
    margin-top:20px;
}
</style>

</head>
<body>

<header>
    <div class="logo">MRπ</div>
    <nav><a href="learn.html">رجوع</a></nav>
</header>

<div class="canvas-box">

<h2>محاكي الدوال المثلثية 🔥</h2>

<p>حرّك الزاوية وشاهد sin و cos مباشرة</p>

<canvas id="circleCanvas" width="300" height="300"></canvas>

<div class="math-display">
    <span id="sinVal">sin: 0</span> |
    <span id="cosVal">cos: 1</span>
</div>

<input type="range" id="angleSlider" min="0" max="360" value="0" style="width:80%;">

<div class="controls">
    <button class="btn" onclick="setAngle(30)">30°</button>
    <button class="btn" onclick="setAngle(45)">45°</button>
    <button class="btn" onclick="setAngle(60)">60°</button>
    <button class="btn" onclick="setAngle(90)">90°</button>
</div>

</div>

<script>
const canvas = document.getElementById("circleCanvas");
const ctx = canvas.getContext("2d");

const centerX = 150;
const centerY = 150;
const radius = 100;

const slider = document.getElementById("angleSlider");
const sinText = document.getElementById("sinVal");
const cosText = document.getElementById("cosVal");

function draw(angleDeg){
    ctx.clearRect(0,0,300,300);

    // دائرة
    ctx.beginPath();
    ctx.arc(centerX, centerY, radius, 0, Math.PI*2);
    ctx.stroke();

    let angle = angleDeg * Math.PI / 180;

    let x = centerX + radius * Math.cos(angle);
    let y = centerY - radius * Math.sin(angle);

    // خط الوتر
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(x,y);
    ctx.strokeStyle = "red";
    ctx.stroke();

    // cos (افقي)
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(x, centerY);
    ctx.strokeStyle = "blue";
    ctx.stroke();

    // sin (عمودي)
    ctx.beginPath();
    ctx.moveTo(x, centerY);
    ctx.lineTo(x, y);
    ctx.strokeStyle = "green";
    ctx.stroke();

    // نقطة
    ctx.beginPath();
    ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fill();

    // تحديث القيم
    sinText.innerText = "sin: " + Math.sin(angle).toFixed(2);
    cosText.innerText = "cos: " + Math.cos(angle).toFixed(2);
}

slider.addEventListener("input", ()=>{
    draw(slider.value);
});

function setAngle(val){
    slider.value = val;
    draw(val);
}

// أول تشغيل
draw(0);
</script>

</body>
</html>
