<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRπ - تعلم من الصفر</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">MRπ</div>
        <nav><a href="index.html">الصفحة الرئيسية</a></nav>
    </header>

    <main class="content-wrapper">
        <section class="visualizer-container">
            <h3>حرك المؤشر لتغيير الزاوية: <span id="angleText">0°</span></h3>
            <div class="graph-box">
                <div class="axis x-axis"></div>
                <div class="axis y-axis"></div>
                <div id="vector" class="vector"></div>
            </div>
            <input type="range" id="angleSlider" min="0" max="360" value="0">
        </section>

        <aside class="notes-sidebar">
            <h2>ملاحظات الزاوية</h2>
            <div id="dynamicNote" class="note-card">
                <p>ابدأ بتحريك المؤشر لرؤية خصائص الزوايا المختلفة.</p>
            </div>
        </aside>
    </main>

    <footer><p>© 2026 مستر باي - جميع الحقوق محفوظة</p></footer>
    <script src="script.js"></script>
</body>
</html>
