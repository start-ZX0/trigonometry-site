<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRπ - Learn</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">MRπ</div>
    <nav>
        <a href="index.html">الرئيسية</a>
    </nav>
</header>

<main class="main-container">

    <section class="visualizer-container">

        <h2 id="angleText">الزاوية: 0°</h2>

        <div class="coordinate-system">
            <div class="axis x-axis"></div>
            <div class="axis y-axis"></div>
            <div id="vector" class="vector"></div>

            <span class="label p0">0°</span>
            <span class="label p90">90°</span>
            <span class="label p180">180°</span>
            <span class="label p270">270°</span>
        </div>

    </section>

    <!-- القوانين (تم إرجاعها) -->
    <section class="laws-grid">

        <div class="law-card blue">
            sin = المقابل / الوتر
        </div>

        <div class="law-card orange">
            cos = المجاور / الوتر
        </div>

        <div class="law-card purple">
            tan = sin / cos
        </div>

        <div class="law-card red">
            csc = 1 / sin
        </div>

        <div class="law-card green">
            sec = 1 / cos
        </div>

        <div class="law-card teal">
            cot = 1 / tan
        </div>

    </section>

    <!-- النصيحة (تم إرجاعها) -->
    <div style="background:#fff9c4;padding:15px;border-radius:10px;margin-top:20px;">
        <strong>💡 نصيحة:</strong>
        <p>قم بحفظ الجدول والقوانين جيداً ثم اختبر نفسك في قسم الاختبار</p>
    </div>

</main>

</body>
</html>
