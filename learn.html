<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRπ - تعلم من الصفر</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="learn-page">

    <header>
        <div class="logo">MRπ</div>
        <nav><a href="index.html">الصفحة الرئيسية</a></nav>
    </header>

    <main class="main-container">
        <div class="nav-control-bar">
            <a href="index.html" class="back-link">العودة للرئيسية</a>
        </div>

        <section class="visualizer-container">
            <h2 id="angleDisplay">الزاوية المختارة: 0°</h2>
            
            <div class="visual-layout">
                <div class="coordinate-system">
                    <div class="axis x-axis"></div>
                    <div class="axis y-axis"></div>
                    <div id="vector" class="vector"></div>
                    <span class="label p0">0°</span>
                    <span class="label p90">90°</span>
                    <span class="label p180">180°</span>
                    <span class="label p270">270°</span>
                </div>

                <div class="values-sidebar">
                    <div class="v-card"><strong>sin:</strong> <span id="sinVal">0</span></div>
                    <div class="v-card"><strong>cos:</strong> <span id="cosVal">1</span></div>
                    <div class="v-card"><strong>tan:</strong> <span id="tanVal">0</span></div>
                </div>
            </div>

            <div class="slider-wrapper">
                <input type="range" id="angleSlider" min="0" max="7" value="0">
                <div class="slider-ticks">
                    <span>0°</span><span>30°</span><span>45°</span><span>60°</span><span>90°</span><span>180°</span><span>270°</span><span>360°</span>
                </div>
            </div>
        </section>

        </main>

    <script src="script.js"></script>
</body>
</html>
