<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn MRπ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div>MRπ</div>
    <a href="index.html">رجوع</a>
</header>

<main class="main-container">

    <h2 id="angleText">الزاوية: 0°</h2>
    <h3 id="radText">π / 0</h3>

    <div class="coordinate-system">
        <div class="axis x-axis"></div>
        <div class="axis y-axis"></div>
        <div class="vector" id="vector"></div>
    </div>

    <!-- السلايدر -->
    <input type="range" id="slider" min="0" max="6" value="0">

    <div style="text-align:center;margin-top:10px;">
        <small>0 - 30 - 45 - 60 - 90 - 180 - 270</small>
    </div>

</main>

<script>
const data = [
    {deg:0, rad:"0", s:0, c:1, t:0},
    {deg:30, rad:"π/6", s:"1/2", c:"√3/2", t:"√3/3"},
    {deg:45, rad:"π/4", s:"√2/2", c:"√2/2", t:"1"},
    {deg:60, rad:"π/3", s:"√3/2", c:"1/2", t:"√3"},
    {deg:90, rad:"π/2", s:"1", c:"0", t:"∞"},
    {deg:180, rad:"π", s:"0", c:"-1", t:"0"},
    {deg:270, rad:"3π/2", s:"-1", c:"0", t:"∞"}
];

const slider = document.getElementById("slider");

slider.addEventListener("input", function() {

    const v = data[this.value];

    document.getElementById("angleText").innerText =
        "الزاوية: " + v.deg + "°";

    document.getElementById("radText").innerText =
        "rad: " + v.rad;

    document.getElementById("vector").style.transform =
        "rotate(" + (-v.deg) + "deg)";
});
</script>

</body>
</html>
