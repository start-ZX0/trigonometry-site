<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRπ - تعلم من الصفر</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="learn-page">
    <header>
        <div class="logo">MRπ</div>
        <nav><a href="index.html">الصفحة الرئيسية</a></nav>
    </header>
    
    <div class="breadcrumb">الرئيسية > الدوال المثلثية > تعلم من الصفر</div>
    
    <main class="content-wrapper">
        <section class="visualizer-container green-theme">
            <h3>استخدم المؤشر لاختيار زاوية خاصة: <span id="angleDisplay">0° / 0π</span></h3>
            
            <div class="graph-box">
                <div class="coordinate-system">
                    <div class="axis x-axis"></div>
                    <div class="axis y-axis"></div>
                    <div id="vector" class="vector"></div>
                </div>
            </div>

            <div class="slider-wrapper">
                <input type="range" id="angleSlider" min="0" max="6" value="0">
                <div class="slider-labels">
                    <span>0</span>
                    <span>π/6</span>
                    <span>π/4</span>
                    <span>π/3</span>
                    <span>π/2</span>
                    <span>π</span>
                    <span>3π/2</span>
                    <span>2π</span>
                </div>
            </div>
        </section>

        <aside class="notes-sidebar">
            <h2>ملاحظات هامة</h2>
            <div id="dynamicNote" class="note-card info-card">
                <p>اختر زاوية حادة أو قائمة من المؤشر لرؤية خصائصها وقيم الدوال المثلثية لها.</p>
            </div>
        </aside>
    </main>
    
    <footer><p>© 2026 مستر باي - جميع الحقوق محفوظة</p></footer>
    
    <script src="script.js"></script>
</body>
</html>
