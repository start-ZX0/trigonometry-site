<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRπ - تعلم</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">MRπ</div>
    <nav><a href="index.html">رجوع</a></nav>
</header>

<div class="main-container">

    <!-- 🔥 زر جديد -->
    <div style="text-align:center; margin-bottom:20px;">
        <a href="basics.html" class="btn">
            محاكي تفاعلي متقدم 🚀
        </a>
    </div>

    <!-- 🔥 كل محتواك القديم رجع كما هو -->
    
    <section class="visualizer-container">
        <h2 id="angleText">الزاوية: 0°</h2>
        <div class="math-display">
            <span id="sinVal" style="color: #d32f2f;">sin: 0</span> | 
            <span id="cosVal" style="color: #1976d2;">cos: 1</span>
        </div>

        <div class="coordinate-system">
            <div class="axis x-axis"></div>
            <div class="axis y-axis"></div>
            <div id="vector" class="vector"></div>
        </div>

        <input type="range" id="angleSlider" min="0" max="7" step="1" value="0" style="width: 80%; margin-top: 20px;">
    </section>

    <!-- الجدول -->
    <table class="values-table">
        <thead>
            <tr>
                <th>الزاوية</th>
                <th>sin</th>
                <th>cos</th>
                <th>tan</th>
            </tr>
        </thead>
        <tbody>
            <tr><td>0°</td><td>0</td><td>1</td><td>0</td></tr>
            <tr><td>30°</td><td>1/2</td><td>√3/2</td><td>1/√3</td></tr>
            <tr><td>45°</td><td>1/√2</td><td>1/√2</td><td>1</td></tr>
            <tr><td>60°</td><td>√3/2</td><td>1/2</td><td>√3</td></tr>
            <tr><td>90°</td><td>1</td><td>0</td><td>Undef</td></tr>
        </tbody>
    </table>

    <!-- القوانين -->
    <section class="laws-grid">
        <div class="law-card" style="background:#1976d2;">sin = مقابل / وتر</div>
        <div class="law-card" style="background:#f57c00;">cos = مجاور / وتر</div>
        <div class="law-card" style="background:#8e24aa;">tan = مقابل / مجاور</div>
    </section>

</div>

<footer>
    <p>MRπ 2026 ©</p>
</footer>

<script src="script.js"></script>

</body>
</html>
