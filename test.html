<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRπ - اختبار حفظي</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* تنسيقات جديدة ومكبرة خصيصاً لهذه الصفحة */
        .card {
            max-width: 600px;
            margin: 20px auto;
            padding: 30px;
        }

        .card h2, .card h3 {
            font-size: 28px;
            margin-bottom: 25px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .quiz-option-btn, #restart-btn {
            background: #ffffff;
            color: #333333;
            border: 2px solid #333333;
            padding: 20px 30px;
            border-radius: 12px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            display: inline-block;
            text-align: center;
        }

        .quiz-option-btn:hover, #restart-btn:hover {
            background-color: #f0f0f0;
            border-color: #333333;
            transform: translateY(-2px);
        }

        .options-grid button {
            font-family: serif;
            line-height: 1.2;
        }

        @media (max-width: 600px) {
            .quiz-option-btn, #restart-btn {
                font-size: 20px;
                padding: 15px 20px;
            }
            .card h2, .card h3 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">MRπ</div>
        <nav><a href="index.html">الرئيسية</a></nav>
    </header>

    <main class="main-container">
        <div class="card" id="level-screen">
            <h2>اختر مستوى الاختبار</h2>
            <div class="options-grid">
                <button class="quiz-option-btn" onclick="startQuiz('beginner')">مستوى مبتدئ</button>
                <button class="quiz-option-btn" onclick="startQuiz('intermediate')">مستوى متوسط</button>
                <button class="quiz-option-btn" onclick="startQuiz('expert')">مستوى خبير</button>
            </div>
        </div>

        <div class="card" id="quiz-screen" style="display: none;">
            <h3 id="question-text">السؤال سيظهر هنا</h3>
            <div id="options-container" class="options-grid">
                </div>
            <p id="score-text" style="margin-top: 20px; font-weight: bold; font-size: 20px; text-align: center;"></p>
            <button class="btn" id="restart-btn" style="display: none; margin-top: 20px;" onclick="location.reload()">إعادة الاختبار</button>
        </div>
    </main>

    <script>
        const questions = {
            beginner: [
                { q: "احسب sin(0°)", options: ["1", "0", "-1", "غير معرف"], answer: "0" },
                { q: "احسب cos(0°)", options: ["0", "1", "1/2", "-1"], answer: "1" },
                { q: "احسب sin(30°)", options: ["1/2", "√3/2", "1", "0"], answer: "1/2" },
                { q: "احسب cos(30°)", options: ["1/2", "√3/2", "1/√2", "1"], answer: "√3/2" },
                { q: "احسب tan(45°)", options: ["0", "1/√3", "1", "√3"], answer: "1" },
                { q: "احسب sin(60°)", options: ["1/2", "1/√2", "√3/2", "1"], answer: "√3/2" },
                { q: "احسب cos(90°)", options: ["1", "0", "-1", "غير معرف"], answer: "0" },
                { q: "هل tan(90°) معرفة؟", options: ["نعم", "لا (غير معرفة)", "تساوي 0", "تساوي 1"], answer: "لا (غير معرفة)" },
                { q: "احسب sin(180°)", options: ["1", "0", "-1", "غير معرف"], answer: "0" },
                { q: "احسب cos(180°)", options: ["1", "0", "-1", "غير معرف"], answer: "-1" },
                { q: "أكمل القانون: sin²θ + cos²θ = ?", options: ["0", "1", "tanθ", "-1"], answer: "1" },
                { q: "أكمل القانون: tanθ = ?", options: ["cos/sin", "1/sin", "sin/cos", "1/cos"], answer: "sin/cos" }
            ],
            intermediate: [
                { q: "احسب: sin(30°) + cos(60°)", options: ["1", "1/2", "√3", "0"], answer: "1" },
                { q: "احسب: sin(45°) × cos(45°)", options: ["1", "1/2", "1/√2", "2"], answer: "1/2" },
                { q: "احسب: tan(45°) + sin(30°)", options: ["3/2", "1", "1/2", "2"], answer: "3/2" },
                { q: "احسب: sin(90°) + cos(90°)", options: ["0", "1", "-1", "2"], answer: "1" },
                { q: "احسب: sin(180°) + cos(180°)", options: ["0", "1", "-1", "-2"], answer: "-1" },
                { q: "احسب: tan(30°) × tan(60°)", options: ["1", "√3", "1/3", "0"], answer: "1" },
                { q: "احسب: cos²(60°)", options: ["1/2", "1/4", "3/4", "1"], answer: "1/4" },
                { q: "احسب: sin(270°) + cos(270°)", options: ["1", "0", "-1", "-2"], answer: "-1" },
                { q: "احسب: sin(360°) × cos(360°)", options: ["1", "0", "-1", "غير معرف"], answer: "0" },
                { q: "احسب: 2 × sin(30°)", options: ["1", "1/2", "2", "0"], answer: "1" }
            ],
            expert: [
                { q: "مقلوب دالة الجيب (1/sin) يسمى:", options: ["sec (القاطع)", "csc (قاطع التمام)", "cot (ظل التمام)", "tan (الظل)"], answer: "csc (قاطع التمام)" },
                { q: "ما هي إشارة دالة cos في الربع الثاني؟", options: ["موجبة", "سالبة", "صفر", "غير معرفة"], answer: "سالبة" },
                { q: "إذا كان sin(θ) = 1/2 والزاوية في الربع الأول، فما هي الزاوية؟", options: ["30° (π/6)", "45° (π/4)", "60° (π/3)", "90° (π/2)"], answer: "30° (π/6)" },
                { q: "قانون ضعف الزاوية sin(2x) يساوي:", options: ["2sin(x)", "sin²(x) - cos²(x)", "2sin(x)cos(x)", "1 - 2sin²(x)"], answer: "2sin(x)cos(x)" },
                { q: "الزاوية 270° بالراديان تكتب كـ:", options: ["π", "3π/2", "2π", "5π/6"], answer: "3π/2" },
                { q: "أي من الدوال التالية موجبة دائماً في الربع الثالث؟", options: ["sin و csc", "cos و sec", "tan و cot", "جميع الدوال"], answer: "tan و cot" },
                { q: "ما هي قيمة المعادلة: sec²θ - tan²θ = ?", options: ["0", "-1", "1", "sinθ"], answer: "1" },
                { q: "المدى (Range) لدالتي sin و cos يقع دائماً بين:", options: ["0 و 1", "-1 و 1", "-∞ و +∞", "1 و 2"], answer: "-1 و 1" }
            ]
        };

        let currentLevel = [];
        let index = 0;
        let score = 0;

        // دالة لخلط ترتيب المصفوفة عشوائياً (Fisher-Yates Shuffle)
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function startQuiz(lvl) {
            // نأخذ نسخة من أسئلة المستوى
            let allQuestions = [...questions[lvl]];
            
            // نخلط ترتيب الأسئلة
            shuffleArray(allQuestions);
            
            // نختار أول 20 سؤال (أو أقل إذا كانت القائمة أصغر من 20)
            currentLevel = allQuestions.slice(0, 20); 

            document.getElementById('level-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            index = 0; 
            score = 0; 
            document.getElementById('score-text').innerText = "";
            document.getElementById('restart-btn').style.display = "none";
            showQuestion();
        }

        function showQuestion() {
            if (index >= currentLevel.length) {
                const percentage = Math.round((score / currentLevel.length) * 100);
                document.getElementById('question-text').innerText = "انتهى الاختبار! 🎉";
                document.getElementById('options-container').innerHTML = "";
                
                document.getElementById('score-text').innerHTML = `
                    <span style="font-size: 28px; color: ${percentage >= 50 ? '#28a745' : '#dc3545'};">
                        النتيجة: ${percentage}%
                    </span>
                    <br>
                    <span style="font-size: 16px; color: #555;">
                        (أجبت بشكل صحيح على ${score} من أصل ${currentLevel.length} أسئلة)
                    </span>
                `;
                document.getElementById('restart-btn').style.display = "block";
                return;
            }
            
            const q = currentLevel[index];
            // عرض رقم السؤال الحالي بالنسبة للمجموع
            document.getElementById('question-text').innerText = `(${index + 1}/${currentLevel.length}) ${q.q}`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            
            // نأخذ نسخة من الخيارات ونخلطها
            let shuffledOptions = [...q.options];
            shuffleArray(shuffledOptions);
            
            // بناء الأزرار بالترتيب العشوائي الجديد
            shuffledOptions.forEach(opt => {
                const b = document.createElement('button');
                b.className = "quiz-option-btn";
                b.innerText = opt;
                b.onclick = () => { 
                    if(opt === q.answer) score++; 
                    index++; 
                    showQuestion(); 
                };
                container.appendChild(b);
            });
        }
    </script>
</body>
</html>
