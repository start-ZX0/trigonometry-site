<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRπ - اختبار حفظي</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .card { max-width: 600px; margin: 20px auto; padding: 30px; }
        .card h2, .card h3 { font-size: 28px; margin-bottom: 25px; text-align: center; }
        .options-grid { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .quiz-option-btn, #restart-btn {
            background: #ffffff; color: #333333; border: 2px solid #333333;
            padding: 18px; border-radius: 12px; font-size: 22px; font-weight: bold;
            cursor: pointer; transition: all 0.2s ease; width: 100%; text-align: center;
        }
        .quiz-option-btn:hover { background-color: #f0f0f0; transform: translateY(-2px); }
        #score-text { margin-top: 20px; font-weight: bold; text-align: center; line-height: 1.6; }
        .motivation-text { display: block; margin-top: 10px; font-style: italic; color: #1976d2; }
        @media (max-width: 600px) { .quiz-option-btn { font-size: 18px; padding: 12px; } }
    </style>
</head>
<body>
    <header>
        <div class="logo">MRπ</div>
        <nav><a href="index.html">الرئيسية</a></nav>
    </header>

    <main class="main-container">
        <div class="card" id="level-screen">
            <h2>اختر مستوى الاختبار</h2>
            <div class="options-grid">
                <button class="quiz-option-btn" onclick="startQuiz('beginner')">مستوى مبتدئ (20 سؤال)</button>
                <button class="quiz-option-btn" onclick="startQuiz('intermediate')">مستوى متوسط (20 سؤال)</button>
                <button class="quiz-option-btn" onclick="startQuiz('expert')">مستوى خبير (20 سؤال)</button>
            </div>
        </div>

        <div class="card" id="quiz-screen" style="display: none;">
            <h3 id="question-text">السؤال سيظهر هنا</h3>
            <div id="options-container" class="options-grid"></div>
            <div id="score-text"></div>
            <button class="quiz-option-btn" id="restart-btn" style="display: none; margin-top: 20px; background: #0d47a1; color: #fff;" onclick="location.reload()">إعادة الاختبار</button>
        </div>
    </main>

    <script>
        const questions = {
            beginner: [
                { q: "sin(0°)", options: ["0", "1", "-1", "1/2"], answer: "0" },
                { q: "cos(0°)", options: ["1", "0", "1/2", "√3/2"], answer: "1" },
                { q: "sin(30°)", options: ["1/2", "√3/2", "1", "0"], answer: "1/2" },
                { q: "cos(30°)", options: ["√3/2", "1/2", "1/√2", "1"], answer: "√3/2" },
                { q: "tan(45°)", options: ["1", "0", "√3", "1/√3"], answer: "1" },
                { q: "sin(60°)", options: ["√3/2", "1/2", "1", "0"], answer: "√3/2" },
                { q: "cos(60°)", options: ["1/2", "√3/2", "1", "0"], answer: "1/2" },
                { q: "sin(90°)", options: ["1", "0", "-1", "غير معرف"], answer: "1" },
                { q: "cos(90°)", options: ["0", "1", "-1", "غير معرف"], answer: "0" },
                { q: "sin(180°)", options: ["0", "1", "-1", "1/2"], answer: "0" },
                { q: "cos(180°)", options: ["-1", "1", "0", "غير معرف"], answer: "-1" },
                { q: "tan(0°)", options: ["0", "1", "غير معرف", "√3"], answer: "0" },
                { q: "sin(270°)", options: ["-1", "1", "0", "1/2"], answer: "-1" },
                { q: "cos(270°)", options: ["0", "-1", "1", "غير معرف"], answer: "0" },
                { q: "sin(45°)", options: ["1/√2", "1/2", "√3/2", "1"], answer: "1/√2" },
                { q: "cos(45°)", options: ["1/√2", "1/2", "√3/2", "1"], answer: "1/√2" },
                { q: "ما هو قانون tan؟", options: ["sin/cos", "cos/sin", "1/sin", "1/cos"], answer: "sin/cos" },
                { q: "sin²x + cos²x =", options: ["1", "0", "-1", "2"], answer: "1" },
                { q: "tan(90°)", options: ["غير معرف", "0", "1", "-1"], answer: "غير معرف" },
                { q: "cos(360°)", options: ["1", "0", "-1", "1/2"], answer: "1" },
                { q: "sin(360°)", options: ["0", "1", "-1", "1/2"], answer: "0" }
            ],
            intermediate: [
                { q: "sin(30°) + cos(60°)", options: ["1", "1/2", "√3", "2"], answer: "1" },
                { q: "tan(45°) + sin(90°)", options: ["2", "1", "0", "3"], answer: "2" },
                { q: "sin(45°) * cos(45°)", options: ["1/2", "1", "1/√2", "1/4"], answer: "1/2" },
                { q: "2 * sin(30°)", options: ["1", "2", "1/2", "0"], answer: "1" },
                { q: "cos²(45°)", options: ["1/2", "1", "1/4", "0"], answer: "1/2" },
                { q: "tan(30°) * √3", options: ["1", "3", "√3", "0"], answer: "1" },
                { q: "sin(180°) + cos(0°)", options: ["1", "0", "-1", "2"], answer: "1" },
                { q: "cos(60°) - sin(30°)", options: ["0", "1", "1/2", "-1"], answer: "0" },
                { q: "tan(60°) / √3", options: ["1", "3", "1/3", "0"], answer: "1" },
                { q: "sin(90°) * cos(180°)", options: ["-1", "1", "0", "2"], answer: "-1" },
                { q: "قيمة sec(0°)", options: ["1", "0", "-1", "غير معرف"], answer: "1" },
                { q: "قيمة csc(90°)", options: ["1", "0", "-1", "غير معرف"], answer: "1" },
                { q: "sin(270°) + sin(90°)", options: ["0", "1", "-1", "2"], answer: "0" },
                { q: "cos(180°) * cos(0°)", options: ["-1", "1", "0", "-2"], answer: "-1" },
                { q: "tan²(45°)", options: ["1", "0", "2", "1/2"], answer: "1" },
                { q: "sin(30°) / cos(30°)", options: ["tan(30°)", "tan(60°)", "1", "0"], answer: "tan(30°)" },
                { q: "1 - sin²(x) =", options: ["cos²(x)", "tan²(x)", "1", "0"], answer: "cos²(x)" },
                { q: "cos(90°) + sin(0°)", options: ["0", "1", "2", "-1"], answer: "0" },
                { q: "2 * cos(60°)", options: ["1", "1/2", "2", "0"], answer: "1" },
                { q: "sin(150°) تساوي", options: ["sin(30°)", "cos(30°)", "sin(60°)", "-sin(30°)"], answer: "sin(30°)" }
            ],
            expert: [
                { q: "مقلوب دالة الجيب (1/sin) هو:", options: ["csc", "sec", "cot", "tan"], answer: "csc" },
                { q: "إشارة الـ cos في الربع الثالث:", options: ["سالبة", "موجبة", "صفر", "دائماً 1"], answer: "سالبة" },
                { q: "sin(2x) تساوي:", options: ["2sin(x)cos(x)", "sin²x-cos²x", "2sin(x)", "cos(2x)"], answer: "2sin(x)cos(x)" },
                { q: "الزاوية 3π/2 بالدرجات:", options: ["270°", "180°", "90°", "360°"], answer: "270°" },
                { q: "في الربع الثاني، أي دالة موجبة؟", options: ["sin", "cos", "tan", "sec"], answer: "sin" },
                { q: "قيمة cot(45°)", options: ["1", "0", "غير معرف", "√3"], answer: "1" },
                { q: "sec²x - tan²x =", options: ["1", "0", "-1", "sin²x"], answer: "1" },
                { q: "إشارة tan في الربع الرابع:", options: ["سالبة", "موجبة", "صفر", "غير معرفة"], answer: "سالبة" },
                { q: "cos(2x) لها قانون هو:", options: ["cos²x - sin²x", "2sin(x)cos(x)", "1 + tan²x", "2cos(x)"], answer: "cos²x - sin²x" },
                { q: "مقلوب tan هو:", options: ["cot", "csc", "sec", "sin"], answer: "cot" },
                { q: "الزاوية π/3 تساوي:", options: ["60°", "30°", "45°", "90°"], answer: "60°" },
                { q: "قيمة sin(π)", options: ["0", "1", "-1", "1/2"], answer: "0" },
                { q: "الدالة العكسية لـ cos هي:", options: ["sec", "csc", "cot", "tan"], answer: "sec" },
                { q: "قيمة csc(30°)", options: ["2", "1/2", "√3/2", "1"], answer: "2" },
                { q: "إذا كان tan x = 1، فإن x =", options: ["45°", "30°", "60°", "90°"], answer: "45°" },
                { q: "أي ربع يكون فيه الكل (All) موجب؟", options: ["الأول", "الثاني", "الثالث", "الرابع"], answer: "الأول" },
                { q: "قيمة cos(π/2)", options: ["0", "1", "-1", "غير معرف"], answer: "0" },
                { q: "1 + tan²x =", options: ["sec²x", "csc²x", "cot²x", "1"], answer: "sec²x" },
                { q: "sin(-x) تساوي:", options: ["-sin(x)", "sin(x)", "cos(x)", "0"], answer: "-sin(x)" },
                { q: "cos(-x) تساوي:", options: ["cos(x)", "-cos(x)", "sin(x)", "0"], answer: "cos(x)" }
            ]
        };

        let currentLevel = [];
        let index = 0;
        let score = 0;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startQuiz(lvl) {
            let all = [...questions[lvl]];
            shuffle(all);
            currentLevel = all.slice(0, 20); // اختيار 20 سؤال عشوائي بدون تكرار
            
            document.getElementById('level-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            index = 0; score = 0;
            showQuestion();
        }

        function getMotivation(pct) {
            if (pct === 100) return "عاشووو! أنت ملك المثلثات، MRπ الحقيقي! 👑";
            if (pct >= 80) return "بطل! درجتك ترفع الرأس، استمر يا وحش. 🔥";
            if (pct >= 50) return "جيد جداً، بس ركز شوية وتجيب الـ 100 المرة الجاية. 👍";
            return "لا تضوج، الرياضيات يرادلها واهس مراجعة. ارجع اقرأ القوانين وتعال! 💪";
        }

        function showQuestion() {
            const container = document.getElementById('options-container');
            const scoreDiv = document.getElementById('score-text');
            
            if (index >= currentLevel.length) {
                const finalScore = (score / currentLevel.length) * 100;
                document.getElementById('question-text').innerText = "النتيجة النهائية";
                container.innerHTML = "";
                scoreDiv.innerHTML = `
                    <div style="font-size: 40px; color: #0d47a1;">${finalScore}/100</div>
                    <div class="motivation-text">${getMotivation(finalScore)}</div>
                `;
                document.getElementById('restart-btn').style.display = "block";
                return;
            }

            const q = currentLevel[index];
            document.getElementById('question-text').innerText = `سؤال ${index + 1}: ${q.q}`;
            container.innerHTML = "";
            scoreDiv.innerText = `الدرجة الحالية: ${(score/currentLevel.length)*100}%`;

            let opts = shuffle([...q.options]);
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "quiz-option-btn";
                btn.innerText = opt;
                btn.onclick = () => {
                    if(opt === q.answer) score++;
                    index++;
                    showQuestion();
                };
                container.appendChild(btn);
            });
        }
    </script>
</body>
</html>
