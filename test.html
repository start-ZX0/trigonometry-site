<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRπ - اختبار حفظي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">MRπ</div>
        <nav><a href="index.html">الرئيسية</a></nav>
    </header>

    <main class="main-container">
        <div class="card" id="level-screen">
            <h2>اختر مستوى الاختبار</h2>
            <div class="options-grid">
                <button class="quiz-option-btn" onclick="startQuiz('beginner')">مستوى مبتدئ</button>
                <button class="quiz-option-btn" onclick="startQuiz('intermediate')">مستوى متوسط</button>
                <button class="quiz-option-btn" onclick="startQuiz('expert')">مستوى خبير</button>
            </div>
        </div>

        <div class="card" id="quiz-screen" style="display: none;">
            <h3 id="question-text"></h3>
            <div id="options-container" class="options-grid"></div>
            <p id="score-text" style="margin-top: 20px; font-weight: bold;"></p>
            <button class="btn" id="restart-btn" style="display: none;" onclick="location.reload()">إعادة</button>
        </div>
    </main>

    <script>
        const questions = {
            beginner: [
                { q: "ما هي قيمة sin(30°)؟", options: ["1/2", "1", "0", "√3/2"], answer: "1/2" },
                { q: "ما هي قيمة cos(0°)؟", options: ["0", "1", "1/2", "√3/2"], answer: "1" }
            ],
            intermediate: [
                { q: "قانون tan هو:", options: ["sin/cos", "cos/sin", "1/sin", "1/cos"], answer: "sin/cos" },
                { q: "الدالة العكسية لـ sin هي:", options: ["csc", "sec", "cot", "tan"], answer: "csc" }
            ],
            expert: [
                { q: "الزاوية 180° بالراديان تساوي:", options: ["π", "π/2", "2π", "3π/2"], answer: "π" },
                { q: "قيمة tan(90°) هي:", options: ["غير معرف", "1", "0", "-1"], answer: "غير معرف" }
            ]
        };

        let currentLevel = [];
        let index = 0;
        let score = 0;

        function startQuiz(lvl) {
            currentLevel = questions[lvl];
            document.getElementById('level-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            if (index >= currentLevel.length) {
                document.getElementById('question-text').innerText = "انتهى الاختبار!";
                document.getElementById('options-container').innerHTML = "";
                document.getElementById('score-text').innerText = `نتيجتك: ${score} من ${currentLevel.length}`;
                document.getElementById('restart-btn').style.display = "inline-block";
                return;
            }
            const q = currentLevel[index];
            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            q.options.forEach(opt => {
                const b = document.createElement('button');
                b.className = "quiz-option-btn";
                b.innerText = opt;
                b.onclick = () => { if(opt === q.answer) score++; index++; showQuestion(); };
                container.appendChild(b);
            });
        }
    </script>
</body>
</html>
