<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أستاذ أيمن - MRπ</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(135deg, #0d47a1, #42a5f5);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* الحاوية */
.chat-container {
    width: 95%;
    max-width: 600px;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
}

/* الهيدر */
.header {
    background: #0d47a1;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header button {
    background: #ff5252;
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
}

/* الرسائل */
#chatBox {
    flex: 1;
    padding: 15px;
    height: 400px;
    overflow-y: auto;
    background: #f5f7fa;
    display: flex;
    flex-direction: column;
}

.message {
    margin: 8px 0;
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 85%;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: break-word;
}

.user-msg {
    background: #1976d2;
    color: white;
    align-self: flex-end;
}

.bot-msg {
    background: #e0e0e0;
    color: #000;
    align-self: flex-start;
    max-height: 300px;
    overflow-y: auto;
}

/* الإدخال */
.input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
}

button.send {
    margin-right: 10px;
    background: #0d47a1;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="chat-container">

    <!-- الهيدر -->
    <div class="header">
        <span>🎓 أستاذ أيمن - MRπ</span>
        <button onclick="goBack()">رجوع</button>
    </div>

    <!-- الرسائل -->
    <div id="chatBox"></div>

    <!-- الإدخال -->
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اكتب سؤالك هنا...">
        <button class="send" onclick="sendMessage()">إرسال</button>
    </div>

</div>

<script>
const API_URL = "https://de7df210-7b1f-45e5-991b-78a241430346-00-2sx1tcedrlb5r.worf.replit.dev/api/chat";

/* رجوع */
function goBack() {
    window.history.back();
}

/* إرسال الرسالة */
async function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user-msg");
    input.value = "";

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        addMessage(data.reply || "لا يوجد رد", "bot-msg");

    } catch (err) {
        addMessage("خطأ في الاتصال بالسيرفر", "bot-msg");
    }
}

/* عرض الرسائل */
function addMessage(text, className) {
    const box = document.getElementById("chatBox");
    const msg = document.createElement("div");
    msg.className = "message " + className;

    msg.innerText = text;
    msg.style.whiteSpace = "pre-wrap"; // مهم لعرض النص الطويل

    box.appendChild(msg);
    box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
