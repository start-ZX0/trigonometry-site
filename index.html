<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRπ - تعلم من الصفر</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="learn-page">
    <header>
        <div class="logo">MRπ</div>
        <nav><a href="index.html">الصفحة الرئيسية</a></nav>
    </header>
    
    <div class="breadcrumb">الرئيسية > الدوال المثلثية > تعلم من الصفر</div>
    
    <main class="content-wrapper">
        <section class="visualizer-container">
            <h3>الزاوية المختارة: <span id="angleDisplay">0°</span></h3>
            
            <div class="flex-layout">
                <div class="graph-box">
                    <div class="coordinate-system">
                        <div class="axis x-axis"></div>
                        <div class="axis y-axis"></div>
                        <div id="vector" class="vector"></div>
                    </div>
                </div>

                <div class="trig-values">
                    <div class="val-item"><strong>sin x:</strong> <span id="sinVal">0</span></div>
                    <div class="val-item"><strong>cos x:</strong> <span id="cosVal">1</span></div>
                    <div class="val-item"><strong>tan x:</strong> <span id="tanVal">0</span></div>
                </div>
            </div>

            <div class="slider-wrapper">
                <input type="range" id="angleSlider" min="0" max="7" value="0">
                <div class="slider-labels">
                    <span>0°</span><span>30°</span><span>45°</span><span>60°</span><span>90°</span><span>180°</span><span>270°</span><span>360°</span>
                </div>
            </div>
        </section>

        <aside class="notes-sidebar">
            <h2>ملاحظات هامة</h2>
            <div id="dynamicNote" class="note-card info-card">
                <p>حرك المؤشر لاستكشاف الزوايا الشهيرة وقيم دوالها.</p>
            </div>
        </aside>
    </main>
    
    <footer><p>© 2026 مستر باي - جميع الحقوق محفوظة</p></footer>
    <script src="script.js"></script>
</body>
</html>
